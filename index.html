<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas (To-Do)</title>
</head>

<body>
  <form action="#">
    <label for="task">Adicionar Tarefa</label>
    <input type="text" id="task" placeholder="Lavar a louça...">
    <button id="btnCreate">Enviar</button>
  </form>
  <h2>Lista de tarefas para fazer: </h2>
  <ul id="listToDo"> </ul>
  <h2>Lista de tarefas feitas: </h2>
  <ul id="listCompleted"></ul>

  <script type="module" src="./script.js"></script>
</body>

</html>
